<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Days Without Injury</title>
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        </br>
        <h1 class="center1 fw-bold">Days Without Injury</h1>
        </br>
        </br>
        </br>
        </br>
        <h1 id="c1" class="dashed center2"><i>ERROR</i></h1>
        </br>
        </br>
        </br>
        </br>
        <h2>Incident Log</h2>
        <div id="list" class="">ERROR</div>
    </body>
    <script>
        //Counter
        fetch('https://api.lgsk.me/count')
            .then(response => response.json())
            .then(data => document.getElementById("c1").innerHTML = "<b>"+data+"<b>");
        //List
        function listIn(data) {
            var message = `<i>${data.length} logs found</i>\n</br>\n</br>\n <tr>\n<th>Date-time</th>\n<th>Severity</th>\n<th>Attempt</th><th>Link</th><\n</tr>\n`;
            data.forEach(data=> {
                message += `<tr>\n<td>${data.hum}</td>\n<td>${data.severity}</td>\n<td>${data.type}</td><td><a href="https://lgsk.me/deet?id=${data.id}">Click Here</a> </td>\n</tr>\n`;
            });
            return message;
        };

        fetch('https://api.lgsk.me/sh')
            .then(response => response.json())
            .then(data => document.getElementById("list").innerHTML = "<table>"+ listIn(data) +"</table>");
    </script>
</html>
